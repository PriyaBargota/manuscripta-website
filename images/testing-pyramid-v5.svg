<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'IBM Plex Sans', Georgia, sans-serif">

  <!-- Background -->
  <rect width="900" height="460" fill="#F8F7F5"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0D3B1F" letter-spacing="0.3">The Testing Pyramid</text>
  <line x1="320" y1="38" x2="580" y2="38" stroke="#15502E" stroke-width="1.5"/>

  <!-- Layer 5: Manual (top) -->
  <polygon points="450,58 398,128 502,128" fill="#CC4D00"/>
  <text x="450" y="103" text-anchor="middle" font-size="11.5" font-weight="700" fill="white">Manual</text>

  <!-- Layer 4: UAT -->
  <polygon points="398,128 502,128 554,198 346,198" fill="#FF6106"/>
  <text x="450" y="158" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">User Acceptance Tests</text>
  <text x="450" y="174" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">5 teaching professionals</text>

  <!-- Layer 3: Integration -->
  <polygon points="346,198 554,198 606,268 294,268" fill="#238A4A"/>
  <text x="450" y="228" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">Integration Tests</text>
  <text x="450" y="245" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">Ephemeral DB · Network protocol sequences</text>

  <!-- Layer 2: Component -->
  <polygon points="294,268 606,268 658,338 242,338" fill="#1A6B3A"/>
  <text x="450" y="298" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">Component Tests</text>
  <text x="450" y="315" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">HeartbeatManager · TcpSocketManager · Services</text>

  <!-- Layer 1: Unit Tests (bottom) -->
  <polygon points="242,338 658,338 710,408 190,408" fill="#15502E"/>
  <text x="450" y="368" text-anchor="middle" font-size="13" font-weight="700" fill="white">Unit Tests</text>
  <text x="450" y="386" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">74 Android + 52 Windows files · 33,532 lines of test code</text>

  <!-- Dividing lines -->
  <line x1="398" y1="128" x2="502" y2="128" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="346" y1="198" x2="554" y2="198" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="294" y1="268" x2="606" y2="268" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="242" y1="338" x2="658" y2="338" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>


  <!-- LEFT AXIS: bidirectional arrow -->
  <line x1="100" y1="400" x2="100" y2="78" stroke="#15502E" stroke-width="1.5"/>
  <!-- Upward pointing triangle at top of left axis -->
  <polygon points="100,66 94,80 106,80" fill="#15502E"/>
  <!-- Downward pointing triangle at bottom of left axis -->
  <polygon points="100,412 94,398 106,398" fill="#15502E"/>
  <!-- Label above top tip -->
  <text x="100" y="58" text-anchor="middle" font-size="13" fill="#15502E" font-weight="600">slower and less frequent</text>
  <!-- Label below bottom tip -->
  <text x="100" y="440" text-anchor="middle" font-size="13" fill="#15502E" font-weight="600">faster and more frequent</text>

  <!-- Footer -->
  <text x="450" y="438" text-anchor="middle" font-size="10" fill="#888">CI pipeline runs unit, component and integration tests automatically on every pull request</text>

</svg>
