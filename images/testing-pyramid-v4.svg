<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="'IBM Plex Sans', Georgia, sans-serif">

  <!-- Background -->
  <rect width="700" height="460" fill="#F8F7F5"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0D3B1F" letter-spacing="0.3">The Testing Pyramid</text>
  <line x1="220" y1="38" x2="480" y2="38" stroke="#15502E" stroke-width="1.5"/>

  <!-- Layer 5: Manual (top) -->
  <polygon points="350,58 298,128 402,128" fill="#CC4D00"/>
  <text x="350" y="103" text-anchor="middle" font-size="11.5" font-weight="700" fill="white">Manual</text>

  <!-- Layer 4: UAT -->
  <polygon points="298,128 402,128 454,198 246,198" fill="#FF6106"/>
  <text x="350" y="158" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">User Acceptance Tests</text>
  <text x="350" y="174" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">5 teaching professionals</text>

  <!-- Layer 3: Integration -->
  <polygon points="246,198 454,198 506,268 194,268" fill="#238A4A"/>
  <text x="350" y="228" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">Integration Tests</text>
  <text x="350" y="245" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">Ephemeral DB · Network protocol sequences</text>

  <!-- Layer 2: Component -->
  <polygon points="194,268 506,268 558,338 142,338" fill="#1A6B3A"/>
  <text x="350" y="298" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">Component Tests</text>
  <text x="350" y="315" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">HeartbeatManager · TcpSocketManager · Services</text>

  <!-- Layer 1: Unit Tests (bottom) -->
  <polygon points="142,338 558,338 610,408 90,408" fill="#15502E"/>
  <text x="350" y="368" text-anchor="middle" font-size="13" font-weight="700" fill="white">Unit Tests</text>
  <text x="350" y="386" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">74 Android + 52 Windows files · 33,532 lines of test code</text>

  <!-- Dividing lines -->
  <line x1="298" y1="128" x2="402" y2="128" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="246" y1="198" x2="454" y2="198" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="194" y1="268" x2="506" y2="268" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="142" y1="338" x2="558" y2="338" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- LEFT AXIS: line going upward, arrowhead at TOP pointing UP -->
  <line x1="50" y1="400" x2="50" y2="78" stroke="#15502E" stroke-width="1.5"/>
  <!-- Upward pointing triangle at top of left axis -->
  <polygon points="50,66 44,80 56,80" fill="#15502E"/>
  <!-- Label far left -->
  <text x="22" y="234" text-anchor="middle" font-size="10.5" fill="#15502E" font-weight="600" transform="rotate(-90 22 234)">Faster · More Frequent</text>

  <!-- RIGHT AXIS: line going downward, arrowhead at BOTTOM pointing DOWN -->
  <line x1="650" y1="68" x2="650" y2="392" stroke="#15502E" stroke-width="1.5"/>
  <!-- Downward pointing triangle at bottom of right axis -->
  <polygon points="650,404 644,390 656,390" fill="#15502E"/>
  <!-- Label far right -->
  <text x="678" y="234" text-anchor="middle" font-size="10.5" fill="#15502E" font-weight="600" transform="rotate(90 678 234)">Slower · Less Frequent</text>

  <!-- Footer -->
  <text x="350" y="438" text-anchor="middle" font-size="10" fill="#888">CI pipeline runs unit, component and integration tests automatically on every pull request</text>

</svg>
