<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">One-to-many Windows and Android architecture diagram</title>
  <desc id="desc">A Windows laptop server connected bidirectionally to three e-ink Android client devices with arrows labelled request and response data.</desc>

  <defs>
    <style>
      .bg { fill: #f8f7f5; }
      .label { font: 600 18px 'IBM Plex Sans', Arial, sans-serif; fill: #1f2937; }
      .sub { font: 500 14px 'IBM Plex Sans', Arial, sans-serif; fill: #4b5563; }
      .arrow-label { font: 600 13px 'IBM Plex Sans', Arial, sans-serif; fill: #15502e; }
      .label-plate { fill: #f8f7f5; opacity: 0.98; }
      .server-shell { fill: #e8f3eb; stroke: #15502e; stroke-width: 3; }
      .server-screen { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; }
      .tablet-shell { fill: #ffffff; stroke: #6b7280; stroke-width: 2.5; }
      .tablet-screen { fill: #fbfbfb; stroke: #d1d5db; stroke-width: 1.6; }
      .line { stroke: #15502e; stroke-width: 3; }
    </style>

    <marker id="arrowHeadBi" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 z" fill="#15502e" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="560" />

  <!-- Windows laptop (server) -->
  <g transform="translate(90 220)">
    <rect class="server-shell" x="0" y="0" rx="18" ry="18" width="300" height="120" />
    <text class="label" x="150" y="56" text-anchor="middle">Windows laptop</text>
    <text class="sub" x="150" y="82" text-anchor="middle">Teacher portal (server)</text>
  </g>

  <!-- Android e-ink clients as tablet shapes -->
  <g transform="translate(820 20)">
    <rect class="tablet-shell" x="0" y="0" rx="18" ry="18" width="150" height="170" />
    <rect class="tablet-screen" x="14" y="14" rx="8" ry="8" width="122" height="130" />
    <circle fill="#9ca3af" cx="75" cy="156" r="5" />
    <text class="label" x="75" y="72" text-anchor="middle">E-ink device</text>
    <text class="sub" x="75" y="96" text-anchor="middle"><tspan x="75" dy="0">Android student</tspan><tspan x="75" dy="16">application (client)</tspan></text>
  </g>

  <g transform="translate(820 195)">
    <rect class="tablet-shell" x="0" y="0" rx="18" ry="18" width="150" height="170" />
    <rect class="tablet-screen" x="14" y="14" rx="8" ry="8" width="122" height="130" />
    <circle fill="#9ca3af" cx="75" cy="156" r="5" />
    <text class="label" x="75" y="72" text-anchor="middle">E-ink device</text>
    <text class="sub" x="75" y="96" text-anchor="middle"><tspan x="75" dy="0">Android student</tspan><tspan x="75" dy="16">application (client)</tspan></text>
  </g>

  <g transform="translate(820 370)">
    <rect class="tablet-shell" x="0" y="0" rx="18" ry="18" width="150" height="170" />
    <rect class="tablet-screen" x="14" y="14" rx="8" ry="8" width="122" height="130" />
    <circle fill="#9ca3af" cx="75" cy="156" r="5" />
    <text class="label" x="75" y="72" text-anchor="middle">E-ink device</text>
    <text class="sub" x="75" y="96" text-anchor="middle"><tspan x="75" dy="0">Android student</tspan><tspan x="75" dy="16">application (client)</tspan></text>
  </g>

  <!-- Bidirectional arrows and labels -->
  <line class="line" x1="390" y1="260" x2="820" y2="105" marker-start="url(#arrowHeadBi)" marker-end="url(#arrowHeadBi)" />

  <line class="line" x1="390" y1="280" x2="820" y2="280" marker-start="url(#arrowHeadBi)" marker-end="url(#arrowHeadBi)" />
  <rect class="label-plate" x="542" y="248" width="186" height="22" rx="10" ry="10" />
  <text class="arrow-label" x="635" y="263" text-anchor="middle">request and response data</text>

  <line class="line" x1="390" y1="300" x2="820" y2="455" marker-start="url(#arrowHeadBi)" marker-end="url(#arrowHeadBi)" />
</svg>

